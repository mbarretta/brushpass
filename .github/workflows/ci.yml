name: CI

on:
  pull_request:

jobs:
  docker-build:
    name: docker-build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # assume CHAINCTL_IDENTITY to pull cgr.dev base images

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Registers a docker credential helper for cgr.dev so the build can pull
      # the private barretta/node base images pinned in the Dockerfile.
      - uses: chainguard-dev/setup-chainctl@2cddd35a2f120d9973e58094dc6878c93cf58c28 # v0.5.1
        with:
          identity: ${{ secrets.CHAINCTL_IDENTITY }}

      # Builds the full multi-stage image. This is the meaningful gate for
      # digestabot PRs: it fails if a new base-image digest can't be pulled or
      # breaks the build, and it also runs `npm ci` + `next build` internally.
      - name: Build image
        run: docker build -t brushpass:ci .
