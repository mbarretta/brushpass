name: Update image digests

on:
  workflow_dispatch:
  schedule:
    # Daily at midnight UTC
    - cron: "0 0 * * *"

jobs:
  update-digests:
    name: Update image digests
    runs-on: ubuntu-latest

    permissions:
      contents: read   # checkout only; the octo-sts token carries the writes
      id-token: write  # mint the OIDC token for octo-sts federation + gitsign

    steps:
      - uses: chainguard-dev/setup-chainctl@2cddd35a2f120d9973e58094dc6878c93cf58c28 # v0.5.1
        with:
          identity: ${{ secrets.CHAINCTL_IDENTITY }}

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Exchange the workflow's OIDC token for a short-lived, repo-scoped GitHub
      # App token per .github/chainguard/digestabot.sts.yaml. Replaces a
      # long-lived PAT; unlike GITHUB_TOKEN, App-token PRs trigger the CI check.
      - uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        id: octo-sts
        with:
          scope: ${{ github.repository }}
          identity: digestabot

      - uses: chainguard-dev/digestabot@afe360aa3b0c29d88844138e8fa0349384398967 # v1.3.1
        id: digestabot
        with:
          token: ${{ steps.octo-sts.outputs.token }}

      # Enable auto-merge: GitHub squash-merges the PR once the required
      # docker-build check passes (branch protection on main). Skips cleanly
      # when digestabot found no digest updates.
      - name: Enable auto-merge on digest PR
        if: ${{ steps.digestabot.outputs.pull_request_number != '' }}
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          PR_NUMBER: ${{ steps.digestabot.outputs.pull_request_number }}
        run: gh pr merge --auto --squash --delete-branch "$PR_NUMBER"
